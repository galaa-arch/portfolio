<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page not found</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0f0f0d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f0f0d; --text:#ece7dd; --muted:#908a7c; --accent:#ff5c35; --line:#2a2a25; }
  * { margin:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:"Space Mono", ui-monospace, monospace;
    min-height:100dvh; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:32px;
  }
  .code {
    font-family:"Fraunces", serif; font-size:clamp(5rem, 22vw, 13rem);
    line-height:.9; letter-spacing:-.03em;
  }
  .code em { font-style:italic; color:var(--accent); }
  p { color:var(--muted); margin:24px 0 36px; font-size:15px; }
  a {
    display:inline-flex; align-items:center; gap:10px;
    color:var(--accent); text-decoration:none; font-size:14px;
    border:1px solid var(--accent); padding:14px 26px;
    transition:transform .2s ease;
  }
  a:hover { transform:translateY(-2px); }
  a svg { width:16px; height:16px; }
</style>
</head>
<body>
  <main>
    <div class="code">4<em>0</em>4</div>
    <p>// this page wandered off the path.</p>
    <a href="/portfolio/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
      Back to safety
    </a>
  </main>
</body>
</html>
